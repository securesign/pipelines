---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: molecule-test-
spec:
  workspaces:
    - name: work
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
  pipelineSpec:
    params:
      - name: SNAPSHOT
    workspaces:
      - name: work
    tasks:
      - name: parse-metadata
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/tekton-integration-catalog
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/test-metadata/0.3/test-metadata.yaml
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
      - name: clone-source-code
        runAfter:
          - parse-metadata
        taskRef:
          params:
            - name: name
              value: git-clone
            - name: bundle
              value: quay.io/konflux-ci/tekton-catalog/task-git-clone:0.2
            - name: kind
              value: task
          resolver: bundles
        params:
          - name: url
            value: $(tasks.parse-metadata.results.git-url)
          - name: revision
            value: $(tasks.parse-metadata.results.git-revision)
          - name: subdirectory
            value: "ansible"
        workspaces:
          - name: output
            workspace: work
      - name: prepare-molecule-tests
        runAfter:
          - clone-source-code
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/securesign/pipelines.git
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/integration-test/prepare-molecule-tests.yaml
        params:
          - name: container-image
            value: $(tasks.parse-metadata.results.container-image)
          - name: ansible-path
            value: "ansible"
        workspaces:
          - name: work
            workspace: work
      - name: run-upgrade-test
        runAfter:
          - prepare-molecule-tests
        params:
          - name: scenario
            value: upgrade
        workspaces:
          - name: work
            workspace: work
        taskSpec:
          params:
            - name: scenario
          workspaces:
            - name: work
          volumes:
            - name: aws-creds
              secret:
                secretName: aws-ci-test
            - name: dockerfile
              secret:
                secretName: ansible-registry-redhat-io-pull-secret
            - name: aah
              secret:
                secretName: ansible-automation-hub-creds
                items:
                  - key: ansible.cfg
                    path: ansible.cfg
            - name: creds
              emptyDir: {}
          steps:
            - name: extract-registry-credentials
              image: "quay.io/redhat-appstudio/konflux-test:stable"
              volumeMounts:
                - name: dockerfile
                  mountPath: /dockerfile
                - name: creds
                  mountPath: /creds
              script: |
                #!/bin/sh
                set -ex
                # extract registry.redhat.io credentials from the secret
                # jq is missing in the ansible-dev-tools-rhel8 image
                jq -r '.auths["registry.redhat.io"].username' /dockerfile/.dockerconfigjson > /creds/rhio-username
                jq -r '.auths["registry.redhat.io"].password' /dockerfile/.dockerconfigjson > /creds/rhio-password
            - name: run-test
              image: "registry.redhat.io/ansible-automation-platform-26/ansible-dev-tools-rhel9@sha256:5192526aa33b8a7f80bd76442a794b747a2637a1ab35822c2ad465224a02895f"
              volumeMounts:
                - name: aws-creds
                  mountPath: /aws-creds
                - name: creds
                  mountPath: /rhio-creds
                - name: aah
                  mountPath: /etc/ansible/ansible.cfg
                  subPath: ansible.cfg
              env:
                - name: RUN_ID
                  value: $(context.pipelineRun.name)
                - name: SCENARIO_NAME
                  value: "upgrade"
                - name: AWS_DEFAULT_REGION
                  value: "eu-north-1"
                - name: AWS_KEY_NAME
                  value: CI-TEST
                - name: HOME
                  value: /tmp
              workingDir: $(workspaces.work.path)/ansible
              script: |
                #!/bin/sh
                set -ex
                
                mkdir -p ~/.ssh
                chmod 700 ~/.ssh
                touch ~/.ssh/known_hosts
                chmod 600 ~/.ssh/known_hosts
                
                cp /aws-creds/private.pem ~/.ssh/
                chmod 400 ~/.ssh/private.pem
                eval $(ssh-agent -s); ssh-add ~/.ssh/private.pem
                
                set +x
                export AWS_SECRET_ACCESS_KEY=$(cat /aws-creds/AWS_ACCESS_KEY)
                export AWS_ACCESS_KEY_ID=$(cat /aws-creds/AWS_ACCESS_KEY_ID)
                export TAS_SINGLE_NODE_REGISTRY_USERNAME=$(cat /rhio-creds/rhio-username)
                export TAS_SINGLE_NODE_REGISTRY_PASSWORD=$(cat /rhio-creds/rhio-password)
                set -x
                
                python3.12 -m pip install --upgrade pip
                python3.12 -m pip install -r $(workspaces.work.path)/ansible/testing-requirements.txt
        
                ansible-galaxy install -r  $(workspaces.work.path)/ansible/molecule/requirements.yml
                
                ansible-galaxy collection install redhat.artifact_signer
                #create preinstalled deployment
                molecule create --scenario-name $(params.scenario)
                
                ansible-galaxy collection install $(workspaces.work.path)/releases/redhat-artifact_signer-*.tar.gz --force
                molecule converge --scenario-name $(params.scenario) && molecule verify --scenario-name $(params.scenario)
              computeResources:
                limits:
                  cpu: 4
                  memory: 8Gi
                requests:
                  cpu: "2.5"
                  memory: 4Gi
    finally:
      - name: aws-cleanup
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/securesign/pipelines.git
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/integration-test/aws-cleanup-ec2-instances.yaml
        params:
          - name: run-id
            value: "$(context.pipelineRun.name)"
