apiVersion: tekton.dev/v1alpha1
kind: StepAction
metadata:
  name: process-go-test-results
spec:
  description: Create standardized TEST_OUTPUT variable from go test result
  params:
    - name: test_output_file
      type: string
      description: Test output json file to be processed
    - name: test_status
      type: string
      description: Execute-test exit status.
  results:
    - name: TEST_OUTPUT
  image: quay.io/redhat-appstudio/konflux-test:stable
  env:
    - name: REPORT_FILE
      value: $(params.test_output_file)
    - name: TEST_STATUS
      value: $(params.test_status)
  script: |
    #!/bin/sh
    set -e

    # Check if file exists
    if [ ! -f "$REPORT_FILE" ]; then
      echo "Test report not found at $REPORT_FILE"
      exit 1
    fi
    
    #print out results
    cat $REPORT_FILE | jq -r 'select(.Action == "output") | .Output'

    if [ -z "$TEST_STATUS" ]; then
      echo "Missing test_status parameter"
      exit 1
    fi
    EXIT_CODE="$TEST_STATUS"

    case "$EXIT_CODE" in
      ''|*[!0-9]*)
        echo "Invalid test_status value: $EXIT_CODE"
        exit 1
        ;;
    esac

    # Extract test counts from JSON file
    read FAILURES SUCCESSES WARNINGS <<EOF
    $(jq -s -r '
      [
        (map(select(.Action == "fail" and .Test)) | length),
        (map(select(.Action == "pass" and .Test)) | length),
        (map(select(.Action == "skip" and .Test)) | length)
      ] | @tsv
    ' "$REPORT_FILE")
    EOF

    # Determine overall result
    if [ "$FAILURES" -gt 0 ] || [ "$EXIT_CODE" -ne 0 ]; then
      RESULT="FAILURE"
    else
      RESULT="SUCCESS"
    fi

    # Get timestamp
    TIMESTAMP=$(date -u --iso-8601=seconds)

    # Output JSON summary
    jq -n --arg result "$RESULT" \
          --arg timestamp "$TIMESTAMP" \
          --argjson failures "$FAILURES" \
          --argjson successes "$SUCCESSES" \
          --argjson warnings "$WARNINGS" \
          --argjson exitCode "$EXIT_CODE" \
    '{
      result: $result,
      timestamp: $timestamp,
      failures: $failures,
      successes: $successes,
      warnings: $warnings,
      exitCode: $exitCode
    }' > "$(step.results.TEST_OUTPUT.path)"

    if [ "$RESULT" != "SUCCESS" ]; then
    echo "Tests failed — exiting with error"
    exit 1
    fi
