---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: molecule-test-
spec:
  workspaces:
    - name: work
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
  pipelineSpec:
    params:
      - name: SNAPSHOT
      - name: releaseBranch
        default: "main"
      - name: scenario
    workspaces:
      - name: work
    tasks:
      - name: parse-metadata
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/tekton-integration-catalog
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/test-metadata/0.3/test-metadata.yaml
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
      - name: clone-source-code
        runAfter:
          - parse-metadata
        taskRef:
          params:
            - name: name
              value: git-clone
            - name: bundle
              value: quay.io/konflux-ci/tekton-catalog/task-git-clone:0.1
            - name: kind
              value: task
          resolver: bundles
        params:
          - name: url
            value: $(tasks.parse-metadata.results.git-url)
          - name: revision
            value: $(tasks.parse-metadata.results.git-revision)
          - name: subdirectory
            value: "artifact-signer-ansible"
        workspaces:
          - name: output
            workspace: work
      - name: clone-e2e-test-source-code
        taskRef:
          params:
            - name: name
              value: git-clone
            - name: bundle
              value: quay.io/konflux-ci/tekton-catalog/task-git-clone:0.1
            - name: kind
              value: task
          resolver: bundles
        params:
          - name: url
            value: https://github.com/securesign/sigstore-e2e
          - name: revision
            value: $(params.releaseBranch)
          - name: subdirectory
            value: "sigstore-e2e"
        workspaces:
          - name: output
            workspace: work
      - name: prepare-molecule-tests
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/securesign/pipelines.git
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/integration-test/prepare-molecule-tests.yaml
        params:
          - name: container-image
            value: $(tasks.parse-metadata.results.container-image)
          - name: ansible-path
            value: "artifact-signer-ansible"
        workspaces:
          - name: work
            workspace: work
      - name: run-molecule-tests
        runAfter:
          - prepare-molecule-tests
          - clone-source-code
        params:
          - name: scenario
            value: $(params.scenario)
          - name: run-id
            value: $(context.pipelineRun.name)
        workspaces:
          - name: sources
            workspace: work
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/securesign/pipelines.git
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/integration-test/ansible/run-molecule-tests.yaml
      - name: run-sigstore-e2e-tests
        runAfter:
          - run-molecule-tests
          - clone-e2e-test-source-code
        params:
          - name: info
            value: $(tasks.run-molecule-tests.results.instance-info)
        workspaces:
          - name: source-code
            workspace: work
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/securesign/pipelines.git
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/integration-test/ansible/run-sigstore-e2e-tests.yaml
    finally:
      - name: aws-cleanup
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/securesign/pipelines.git
            - name: revision
              value: eli/dupeCode
            - name: pathInRepo
              value: tasks/integration-test/aws-cleanup-ec2-instances.yaml
        params:
          - name: run-id
            value: "$(context.pipelineRun.name)"
