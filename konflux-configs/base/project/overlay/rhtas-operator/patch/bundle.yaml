- op: add
  path: /spec/resources/-
  value:
    apiVersion: appstudio.redhat.com/v1alpha1
    kind: Component
    metadata:
      annotations:
        mintmaker.appstudio.redhat.com/disabled: "{{.mintmakerDisabled}}"
      name: "rhtas-operator-bundle{{.nameSuffix}}"
    spec:
      application: "{{.application}}{{.nameSuffix}}"
      componentName: "rhtas-operator-bundle{{.nameSuffix}}"
      source:
        git:
          context: ./
          dockerfileUrl: bundle.Dockerfile
          revision: "{{.branch}}"
          url: https://github.com/securesign/secure-sign-operator
- op: add
  path: /spec/resources/-
  value:
    apiVersion: appstudio.redhat.com/v1alpha1
    kind: ImageRepository
    metadata:
      name: "rhtas-operator-bundle{{.nameSuffix}}"
      annotations:
        image-controller.appstudio.redhat.com/update-component-image: 'true'
      labels:
        appstudio.redhat.com/application: "{{.application}}{{.nameSuffix}}"
        appstudio.redhat.com/component: "rhtas-operator-bundle{{.nameSuffix}}"
    spec:
      image:
        name: rhtas-tenant/rhtas-operator-bundle
        visibility: public
      notifications:
        - config:
            url: https://bombino.api.redhat.com/v1/sbom/quay/push
          event: repo_push
          method: webhook
          title: SBOM-event-to-Bombino
