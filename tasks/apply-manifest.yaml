apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apply-manifests
spec:
  workspaces:
    - name: output
  stepTemplate:
    env:
      - name: HOME
        value: /workspace
    image: quay.io/konflux-ci/task-runner:1.7.0@sha256:5938ef0f857aa7439bb1d16ced95790becef0fd6f5652185e8f32212b863ec80
    workingDir: /workspace/output/source
  params:
    - name: manifest
      type: string
      description: Manifest to apply
    - name: release
      type: string
      default: "false"
      description: whether or not to apply the manifest
  steps:
    - name: apply-manifest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "Applying: $(params.manifest)"
        cat "$(params.manifest)"
        echo ""

        if [ "$(params.release)" == "true" ]; then
          oc apply -f "$(params.manifest)"
        else
          echo "Performing DRY RUN"
          oc apply --dry-run=server -f "$(params.manifest)"
        fi
