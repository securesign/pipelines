apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: push-to-github
spec:
  description: >
    Tekton Task to clone and push rc images to GitHub
  workspaces:
    - name: output
  params:
    - name: git-url
      description: Source Repository URL
    - name: revision
      description: Revision
    - name: snapshotSpecFile
      description: Path to the stored Snapshot spec JSON file
    - name: type
      description: The type of image being pushed, should be one of component, operator, or fbc
    - name: file-name
      description: Name of file to push to in $(params.git-url)
  stepTemplate:
    image: quay.io/konflux-ci/appstudio-utils:48c311af02858e2422d6229600e9959e496ddef1@sha256:91ddd999271f65d8ec8487b10f3dd378f81aa894e11b9af4d10639fd52bba7e8
    workingDir: /workspace/output/source
    env:
      - name: HOME
        value: /workspace
  steps:
    - name: generate-access-token
      env:
        - name: GITHUB_APP_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: git-auth-app
              key: client-id
        - name: GITHUB_APP_INSTALLATION_ID
          valueFrom:
            secretKeyRef:
              name: git-auth-app
              key: installation-id
        - name: GITHUB_APP_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: git-auth-app
              key: private-key
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        if [ -z "${GITHUB_APP_CLIENT_ID:-}" ] || [ -z "${GITHUB_APP_INSTALLATION_ID:-}" ] || [ -z "${GITHUB_APP_PRIVATE_KEY:-}" ]; then
          echo "GitHub App credentials are not set!"
          exit 1
        fi

        pem_file="$(mktemp)"
        trap 'rm -f "${pem_file}"' EXIT
        printf '%s' "${GITHUB_APP_PRIVATE_KEY}" > "${pem_file}"

        client_id="${GITHUB_APP_CLIENT_ID}" # Client ID (test.sh arg 1)
        pem="$(cat "${pem_file}")" # Private key contents loaded from file (test.sh arg 2)

        now=$(date +%s)
        iat=$((${now} - 60)) # Issues 60 seconds in the past
        exp=$((${now} + 600)) # Expires 10 minutes in the future

        b64enc() { openssl base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n'; }

        header_json='{
            "typ":"JWT",
            "alg":"RS256"
        }'
        # Header encode
        header=$( echo -n "${header_json}" | b64enc )

        payload_json="{
            \"iat\":${iat},
            \"exp\":${exp},
            \"iss\":\"${client_id}\"
        }"
        # Payload encode
        payload=$( echo -n "${payload_json}" | b64enc )

        # Signature
        header_payload="${header}"."${payload}"
        signature=$(
            openssl dgst -sha256 -sign <(echo -n "${pem}") \
            <(echo -n "${header_payload}") | b64enc
        )

        # Create JWT
        JWT="${header_payload}"."${signature}"
        TOKEN_RESPONSE="$(curl --silent --show-error --fail \
          --request POST \
          --url "https://api.github.com/app/installations/${GITHUB_APP_INSTALLATION_ID}/access_tokens" \
          --header "Accept: application/vnd.github+json" \
          --header "Authorization: Bearer $JWT" \
          --header "X-GitHub-Api-Version: 2022-11-28")"

        GH_TOKEN="$(echo "${TOKEN_RESPONSE}" | jq -r '.token')"
        if [ -z "${GH_TOKEN}" ] || [ "${GH_TOKEN}" = "null" ]; then
          echo "Failed to generate GH_TOKEN"
          echo "${TOKEN_RESPONSE}" | jq .
          exit 1
        fi

        printf 'https://x-access-token:%s@github.com\n' "${GH_TOKEN}" > /workspace/credentials
        chmod 0600 /workspace/credentials

        # https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/generating-a-json-web-token-jwt-for-a-github-app
        # https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/generating-an-installation-access-token-for-a-github-app

    - name: configure-and-clone
      script: |
        #!/usr/bin/env sh
        set +x  # so we don't echo our token
        set -e

        if [ ! -s /workspace/credentials ]; then
          echo "Git credentials are not set!"
          exit 1
        fi

        # Configure Git
        git config --global user.email "RHTAS-build-bot@users.noreply.github.com"
        git config --global user.name "RHTAS-build-bot"

        git config --global credential.helper "store --file=/workspace/credentials" 
        
        git clone "$(params.git-url)" repo

    - name: set-file-type
      env:
        - name: IMAGE_TYPE
          value: '$(params.type)'
        - name: INPUT_FILE_NAME
          value: '$(params.file-name)'
      script: |
        #!/usr/bin/env sh
        set -e

        if [ -n "$INPUT_FILE_NAME" ]; then
          FILE_NAME="$INPUT_FILE_NAME"
        else
          if [ "$IMAGE_TYPE" = "fbc" ]; then
            FILE_NAME="fbc.json"
          elif [ "$IMAGE_TYPE" = "operator" ]; then
            FILE_NAME="operator.json"
          elif [ "$IMAGE_TYPE" = "component" ]; then
            FILE_NAME="components.json"
          else
            echo "Unknown IMAGE_TYPE: $IMAGE_TYPE"
            exit 1
          fi
        fi

        echo -n "$FILE_NAME"
        printf '%s\n' "$FILE_NAME" > /workspace/file_name

    - name: push-snapshot
      env:
        - name: SNAPSHOT_SPEC_FILE_PATH
          value: '$(params.snapshotSpecFile)'
      script: |
        #!/usr/bin/env sh
        set -e
        SNAPSHOT_SPEC=$(cat "${SNAPSHOT_SPEC_FILE_PATH}")

        if [ -f /workspace/file_name ]; then
          FILE_NAME="$(cat /workspace/file_name)"
        else
          echo "Error: file_name not found!"
          exit 1
        fi

        echo "==== SNAPSHOT SPEC ===="
        echo "${SNAPSHOT_SPEC}" | jq .

        cd repo
        git fetch origin
        if git ls-remote --heads origin | grep -q "refs/heads/$(params.revision)"; then
            echo "Branch $(params.revision) exists on remote. Checking out..."
            git checkout -B "$(params.revision)" origin/"$(params.revision)"
            git pull --rebase origin "$(params.revision)"
        else
            echo "Branch $(params.revision) does not exist. Creating and pushing it..."
            git checkout -b "$(params.revision)"
            git push origin "$(params.revision)"
        fi

        if [ ! -f "$FILE_NAME" ]; then
          echo "[]" > "$FILE_NAME"
        fi

        jq --argjson newSnap "${SNAPSHOT_SPEC}" '
          if any(.[]; .snapshot_spec.application == $newSnap.snapshot_spec.application) then
            map(
              if .snapshot_spec.application == $newSnap.snapshot_spec.application then
                $newSnap
              else
                .
              end
            )
          else
            . + [ $newSnap ]
          end
        ' "$FILE_NAME" > tmp.json && mv tmp.json "$FILE_NAME"

        git add "$FILE_NAME"
        APP_NAME=$(echo "${SNAPSHOT_SPEC}" | jq -r '.snapshot_spec.application')
        git commit -m ":robot:[RHTAS-build-bot] Promote "${APP_NAME}" to candidate"

        MAX_RETRIES=5
        attempt=0
        while [ $attempt -lt $MAX_RETRIES ]; do
            git fetch origin
            git rebase origin/"$(params.revision)" || { echo "Rebase failed, retrying..."; git rebase --abort; }
            if git push origin "$(params.revision)"; then
                echo "Push successful"
                break
            else
                attempt=$(( attempt + 1 ))
                sleep_time=$(( 2 ** attempt ))
                sleep $sleep_time
            fi
        done

        if [ $attempt -eq $MAX_RETRIES ]; then
            echo "Push failed after $MAX_RETRIES attempts. Exiting."
            exit 1
        fi
