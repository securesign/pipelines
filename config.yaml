apiVersion: projctl.konflux.dev/v1beta1
kind: ProjectDevelopmentStreamTemplate
metadata:
  labels:
    build.rhtas.com/type: ansible
  name: ansible-template
  namespace: rhtas-dev-tenant
spec:
  project: ansible
  resources:
  - apiVersion: appstudio.redhat.com/v1alpha1
    kind: Application
    metadata:
      name: '{{.application}}{{.nameSuffix}}'
    spec:
      displayName: '{{.application}} ({{.version}})'
  - apiVersion: appstudio.redhat.com/v1alpha1
    kind: ReleasePlan
    metadata:
      labels:
        release.appstudio.openshift.io/auto-release: "true"
        release.appstudio.openshift.io/standing-attribution: "true"
      name: promote-to-candidate-{{.application}}{{.nameSuffix}}
    spec:
      application: '{{.application}}{{.nameSuffix}}'
      tenantPipeline:
        params:
        - name: git-url
          value: https://github.com/securesign/releases
        - name: revision
          value: RHTAS-build-bot_candidate-images-{{.version}}
        - name: code-freeze
          value: "false"
        - name: type
          value: operator
        pipelineRef:
          params:
          - name: url
            value: https://github.com/securesign/pipelines
          - name: revision
            value: main
          - name: pathInRepo
            value: pipelines/promote-to-candidate.yaml
          resolver: git
        serviceAccountName: rhtas-build-bot
  - apiVersion: appstudio.redhat.com/v1beta2
    kind: IntegrationTestScenario
    metadata:
      annotations:
        test.appstudio.openshift.io/kind: enterprise-contract
      name: '{{.application}}{{.nameSuffix}}-enterprise-contract'
    spec:
      application: '{{.application}}{{.nameSuffix}}'
      params:
      - name: POLICY_CONFIGURATION
        value: rhtap-releng-tenant/registry-rhtas
      resolverRef:
        params:
        - name: url
          value: https://github.com/konflux-ci/build-definitions
        - name: revision
          value: main
        - name: pathInRepo
          value: pipelines/enterprise-contract.yaml
        resolver: git
        resourceKind: pipeline
  - apiVersion: appstudio.redhat.com/v1alpha1
    kind: Component
    metadata:
      annotations:
        build.appstudio.openshift.io/pipeline: '{"name":"docker-build","bundle":"latest"}'
        build.appstudio.openshift.io/status: '{"pac":{"state":"enabled","merge-url":"https://github.com/securesign/artifact-signer-ansible/pull/259","configuration-time":"Wed,
          07 Aug 2024 08:59:18 UTC"},"message":"done"}'
        mintmaker.appstudio.redhat.com/disabled: "true"
      name: artifact-signer-ansible{{.nameSuffix}}
    spec:
      application: '{{.application}}{{.nameSuffix}}'
      componentName: artifact-signer-ansible{{.nameSuffix}}
      source:
        git:
          context: ./
          dockerfileUrl: Dockerfile
          revision: '{{.branch}}'
          url: https://github.com/securesign/artifact-signer-ansible
  - apiVersion: appstudio.redhat.com/v1beta2
    kind: IntegrationTestScenario
    metadata:
      labels:
        test.appstudio.openshift.io/optional: "false"
      name: ansible-e2e-test-default{{.nameSuffix}}
    spec:
      application: '{{.application}}{{.nameSuffix}}'
      contexts:
      - description: runs molecule and go-e2e test suite on ansible collection
        name: application
      params:
      - name: releaseBranch
        value: '{{.branch}}'
      - name: scenario
        value: default
      resolverRef:
        params:
        - name: url
          value: https://github.com/securesign/pipelines.git
        - name: revision
          value: main
        - name: pathInRepo
          value: pipelines/integration-test/ansible.yaml
        resolver: git
        resourceKind: pipelinerun
  - apiVersion: appstudio.redhat.com/v1beta2
    kind: IntegrationTestScenario
    metadata:
      labels:
        test.appstudio.openshift.io/optional: "false"
      name: ansible-e2e-test-user-provided{{.nameSuffix}}
    spec:
      application: '{{.application}}{{.nameSuffix}}'
      contexts:
      - description: runs molecule and go-e2e test suite on ansible collection
        name: application
      params:
      - name: releaseBranch
        value: '{{.branch}}'
      - name: scenario
        value: user_provided
      resolverRef:
        params:
        - name: url
          value: https://github.com/securesign/pipelines.git
        - name: revision
          value: main
        - name: pathInRepo
          value: pipelines/integration-test/ansible.yaml
        resolver: git
        resourceKind: pipelinerun
  - apiVersion: appstudio.redhat.com/v1beta2
    kind: IntegrationTestScenario
    metadata:
      labels:
        test.appstudio.openshift.io/optional: "false"
      name: ansible-e2e-test-key-rotation{{.nameSuffix}}
    spec:
      application: '{{.application}}{{.nameSuffix}}'
      contexts:
      - description: runs molecule and go-e2e test suite on ansible collection
        name: application
      params:
      - name: releaseBranch
        value: '{{.branch}}'
      - name: scenario
        value: key_rotation
      resolverRef:
        params:
        - name: url
          value: https://github.com/securesign/pipelines.git
        - name: revision
          value: main
        - name: pathInRepo
          value: pipelines/integration-test/ansible.yaml
        resolver: git
        resourceKind: pipelinerun
  - apiVersion: appstudio.redhat.com/v1beta2
    kind: IntegrationTestScenario
    metadata:
      labels:
        test.appstudio.openshift.io/optional: "false"
      name: ansible-e2e-test-backup-restore{{.nameSuffix}}
    spec:
      application: '{{.application}}{{.nameSuffix}}'
      contexts:
      - description: runs molecule and go-e2e test suite on ansible collection
        name: '{{- if eq .version "v1.2" -}} disabled {{- else -}} application {{-
          end -}}'
      params:
      - name: releaseBranch
        value: '{{.branch}}'
      - name: scenario
        value: backup_restore_migrate
      resolverRef:
        params:
        - name: url
          value: https://github.com/securesign/pipelines.git
        - name: revision
          value: main
        - name: pathInRepo
          value: pipelines/integration-test/ansible.yaml
        resolver: git
        resourceKind: pipelinerun
  - apiVersion: appstudio.redhat.com/v1beta2
    kind: IntegrationTestScenario
    metadata:
      labels:
        test.appstudio.openshift.io/optional: "false"
      name: ansible-e2e-test-postgresql{{.nameSuffix}}
    spec:
      application: '{{.application}}{{.nameSuffix}}'
      contexts:
      - description: runs molecule and go-e2e test suite on ansible collection
        name: '{{- if or (eq .version "v1.2") (eq .version "v1.3") -}} disabled {{-
          else -}} application {{- end -}}'
      params:
      - name: releaseBranch
        value: '{{.branch}}'
      - name: scenario
        value: postgresql
      resolverRef:
        params:
        - name: url
          value: https://github.com/securesign/pipelines.git
        - name: revision
          value: main
        - name: pathInRepo
          value: pipelines/integration-test/ansible.yaml
        resolver: git
        resourceKind: pipelinerun
  - apiVersion: appstudio.redhat.com/v1beta2
    kind: IntegrationTestScenario
    metadata:
      labels:
        test.appstudio.openshift.io/optional: "false"
      name: ansible-upgrade-test{{.nameSuffix}}
    spec:
      application: '{{.application}}{{.nameSuffix}}'
      contexts:
      - description: runs molecule upgrade test on ansible collection
        name: '{{- if eq .version "v1.2" -}} disabled {{- else -}} application {{-
          end -}}'
      resolverRef:
        params:
        - name: url
          value: https://github.com/securesign/pipelines.git
        - name: revision
          value: main
        - name: pathInRepo
          value: pipelines/integration-test/ansible-upgrade.yaml
        resolver: git
        resourceKind: pipelinerun
  variables:
  - description: A version number for a new development stream
    name: version
  - defaultValue: main
    description: Git branch
    name: branch
  - defaultValue: -{{hyphenize .version}}
    description: A suffix which will be added to K8s resource name
    name: nameSuffix
  - defaultValue: ansible
    description: The application name
    name: application
  - defaultValue: "false"
    description: Whether to disable mintmaker annotation on the Component
    name: mintmakerDisabled
---
