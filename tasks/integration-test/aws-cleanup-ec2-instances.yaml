apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: aws-cleanup-ec2-instances
spec:
  description: |
    Terminates AWS EC2 instances created during integration tests based on run ID tag.
    Uses aws-ci-test secret credentials to clean up ephemeral test infrastructure.
  params:
    - name: run-id
      type: string
      description: Pipeline run ID used to tag and identify EC2 instances to terminate
    - name: aws-region
      type: string
      default: "eu-north-1"
      description: AWS region where EC2 instances are running
  volumes:
    - name: aws-creds
      secret:
        secretName: aws-ci-test
  steps:
    - name: terminate-instances
      volumeMounts:
        - name: aws-creds
          mountPath: /creds
      image: amazon/aws-cli:latest
      env:
        - name: AWS_DEFAULT_REGION
          value: "$(params.aws-region)"
      script: |
        #!/bin/bash
        set -eu

        echo "=========================================="
        echo "🧹 Running REFACTORED aws-cleanup-ec2-instances task from eli/dupeCode branch"
        echo "=========================================="

        set +x
        export AWS_SECRET_ACCESS_KEY=$(cat /creds/AWS_ACCESS_KEY)
        export AWS_ACCESS_KEY_ID=$(cat /creds/AWS_ACCESS_KEY_ID)
        set -x

        # Check for credentials before proceeding (crucial step)
        if [ -z "${AWS_ACCESS_KEY_ID}" ]; then
          echo "ERROR: AWS_ACCESS_KEY_ID environment variable is missing." >&2
          exit 1
        fi

        INSTANCE_LIST=$(
          aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=CI-$(params.run-id)*" "Name=instance-state-name,Values=running,pending" \
          --query 'Reservations[].Instances[].InstanceId' \
          --output text
        )
        echo "Instance IDs received for termination: ${INSTANCE_LIST} in ${AWS_DEFAULT_REGION}..."

        aws ec2 terminate-instances \
          --instance-ids ${INSTANCE_LIST} \
          --region ${AWS_DEFAULT_REGION} \
          --output text

        echo "Termination request sent for instance ${INSTANCE_LIST}."
